name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run package win32
        env:
          CI: true

      - name: Get release assets
        id: assets
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SUFFIX="${VERSION}-${TIMESTAMP}"

          echo "=== Windows Build Artifacts ==="
          find src-tauri/target/release/bundle/nsis -type f

          # Find and copy .exe
          exe_file=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          if [ -f "$exe_file" ]; then
            exe_name="oh-my-file-${SUFFIX}.exe"
            cp "$exe_file" /tmp/"$exe_name"
            echo "exe=$exe_name" >> $GITHUB_OUTPUT
            echo "exe_path=/tmp/$exe_name" >> $GITHUB_OUTPUT
          fi

      - name: Upload EXE to Release
        if: steps.assets.outputs.exe != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.assets.outputs.exe_path }}
          asset_name: ${{ steps.assets.outputs.exe }}
          asset_content_type: application/octet-stream

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run package darwin
        env:
          CI: true

      - name: Get release assets
        id: assets
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SUFFIX="${VERSION}-${TIMESTAMP}"

          echo "=== macOS Build Artifacts ==="
          find src-tauri/target/release/bundle/macos -type f

          # Find and copy .dmg
          dmg_file=$(find src-tauri/target/release/bundle/macos -name "*.dmg" | head -1)
          if [ -f "$dmg_file" ]; then
            dmg_name="oh-my-file-${SUFFIX}.dmg"
            cp "$dmg_file" /tmp/"$dmg_name"
            echo "dmg=$dmg_name" >> $GITHUB_OUTPUT
            echo "dmg_path=/tmp/$dmg_name" >> $GITHUB_OUTPUT
          fi

      - name: Upload DMG to Release
        if: steps.assets.outputs.dmg != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.assets.outputs.dmg_path }}
          asset_name: ${{ steps.assets.outputs.dmg }}
          asset_content_type: application/x-apple-diskimage

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libgtk-4-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run package linux
        env:
          CI: true

      - name: Get release assets
        id: assets
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SUFFIX="${VERSION}-${TIMESTAMP}"

          echo "=== Linux Build Artifacts ==="
          find src-tauri/target/release/bundle/linux -type f

          # Find and copy .deb
          deb_file=$(find src-tauri/target/release/bundle/linux -name "*.deb" | head -1)
          if [ -f "$deb_file" ]; then
            deb_name="oh-my-file-${SUFFIX}.deb"
            cp "$deb_file" /tmp/"$deb_name"
            echo "deb=$deb_name" >> $GITHUB_OUTPUT
            echo "deb_path=/tmp/$deb_name" >> $GITHUB_OUTPUT
          fi

          # Find and copy .AppImage
          appimage_file=$(find src-tauri/target/release/bundle/linux -name "*.AppImage" | head -1)
          if [ -f "$appimage_file" ]; then
            appimage_name="oh-my-file-${SUFFIX}.AppImage"
            cp "$appimage_file" /tmp/"$appimage_name"
            echo "appimage=$appimage_name" >> $GITHUB_OUTPUT
            echo "appimage_path=/tmp/$appimage_name" >> $GITHUB_OUTPUT
          fi

      - name: Upload DEB to Release
        if: steps.assets.outputs.deb != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.assets.outputs.deb_path }}
          asset_name: ${{ steps.assets.outputs.deb }}
          asset_content_type: application/x-deb

      - name: Upload AppImage to Release
        if: steps.assets.outputs.appimage != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.assets.outputs.appimage_path }}
          asset_name: ${{ steps.assets.outputs.appimage }}
          asset_content_type: application/octet-stream

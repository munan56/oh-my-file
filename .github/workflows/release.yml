name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run package win32
        env:
          CI: true

      - name: Get release assets
        id: assets
        shell: bash
        run: |
          # Find .msi file
          msi_file=$(find src-tauri/target/release/bundle/nsis -name "*.msi" | head -1)
          if [ -f "$msi_file" ]; then
            echo "msi=$(basename $msi_file)" >> $GITHUB_OUTPUT
            echo "msi_path=$msi_file" >> $GITHUB_OUTPUT
          fi

          # Find .exe file
          exe_file=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | grep -v "installers" | head -1)
          if [ -f "$exe_file" ]; then
            echo "exe=$(basename $exe_file)" >> $GITHUB_OUTPUT
            echo "exe_path=$exe_file" >> $GITHUB_OUTPUT
          fi

      - name: Upload MSI to Release
        if: steps.assets.outputs.msi != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.assets.outputs.msi_path }}
          asset_name: ${{ steps.assets.outputs.msi }}
          asset_content_type: application/x-msi

      - name: Upload EXE to Release
        if: steps.assets.outputs.exe != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.assets.outputs.exe_path }}
          asset_name: ${{ steps.assets.outputs.exe }}
          asset_content_type: application/octet-stream

